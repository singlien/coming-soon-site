<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="網站目前正在建置中，近期即將正式上線。"
    />
    <meta property="og:title" content="網站建置中｜近期上線" />
    <meta
      property="og:description"
      content="我們正在整理內容、測試功能並優化體驗，網站近期即將上線。"
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#10253f" />
    <title>網站建置中｜近期上線</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell" aria-labelledby="page-title">
      <section class="hero" aria-label="網站狀態">
        <div class="hero__copy">
          <p class="eyebrow">Coming Soon</p>
          <h1 id="page-title">網站建置中</h1>
          <p class="lead">
            我們正在整理內容、測試功能並優化瀏覽體驗。這個網站會在近期正式上線，敬請期待。
          </p>
          <div class="actions" aria-label="目前進度">
            <span class="status-pill">內容整理中</span>
            <span class="status-pill">功能測試中</span>
            <span class="status-pill">近期上線</span>
          </div>
        </div>

        <div class="visual-panel" aria-hidden="true">
          <div class="window-card">
            <div class="window-card__bar">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="blueprint">
              <div class="blueprint__header"></div>
              <div class="blueprint__line blueprint__line--wide"></div>
              <div class="blueprint__line"></div>
              <div class="blueprint__grid">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="blueprint__progress">
                <span></span>
              </div>
            </div>
          </div>
          <div class="signal-ring signal-ring--one"></div>
          <div class="signal-ring signal-ring--two"></div>
        </div>
      </section>

      <section class="info-band" aria-label="上線準備">
        <article>
          <span class="info-band__number">01</span>
          <h2>內容準備</h2>
          <p>正在確認頁面資訊，讓正式上線後的內容清楚、完整且容易閱讀。</p>
        </article>
        <article>
          <span class="info-band__number">02</span>
          <h2>體驗調整</h2>
          <p>持續檢查桌機與手機版面，確保不同裝置都能順暢瀏覽。</p>
        </article>
        <article>
          <span class="info-band__number">03</span>
          <h2>即將公開</h2>
          <p>完成最後確認後，網站就會正式開放。感謝你的耐心等候。</p>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="current-year"></span> All rights reserved.</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
